name: Create and publish Docker images with specific build args

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - custom
      - future
    tags:
      - v*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/*.disabled'

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-main-image:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Set repository and image name to lowercase
        run: |
          set -euo pipefail
          image_name="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE_NAME=${REGISTRY}/${image_name}" >> "$GITHUB_ENV"

      - name: Prepare
        run: |
          set -euo pipefail
          platform='${{ matrix.platform }}'
          platform_pair="${platform//\//-}"
          ref_tag="${GITHUB_REF_NAME//\//-}"
          ref_tag="$(sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//' <<< "$ref_tag")"
          ref_tag="${ref_tag:-ref}"
          echo "PLATFORM_PAIR=${platform_pair}" >> "$GITHUB_ENV"
          echo "REF_TAG=${ref_tag:0:48}" >> "$GITHUB_ENV"
          echo "TEMP_TAG=build-${ref_tag:0:48}-${GITHUB_SHA:0:12}-main-${platform_pair}" >> "$GITHUB_ENV"
          echo "BUILDER_NAME=halo-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-main-${platform_pair}" >> "$GITHUB_ENV"

      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --no-tags --prune --depth=1 origin "$GITHUB_SHA"
          git checkout --force --detach FETCH_HEAD

      - name: Log in to the Container registry
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        run: |
          set -euo pipefail
          docker buildx version
          docker buildx create --name "$BUILDER_NAME" --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build Docker image (latest)
        run: |
          set -euo pipefail
          docker buildx build \
            --platform '${{ matrix.platform }}' \
            --push \
            --provenance=false \
            --cache-from "type=registry,ref=${FULL_IMAGE_NAME}:cache-main-${PLATFORM_PAIR}" \
            --cache-to "type=registry,ref=${FULL_IMAGE_NAME}:cache-main-${PLATFORM_PAIR},mode=max" \
            --build-arg "BUILD_HASH=${GITHUB_SHA}" \
            --build-arg "HALO_RUNTIME_PROFILE=main" \
            -t "${FULL_IMAGE_NAME}:${TEMP_TAG}" \
            .

      - name: Clean up builder
        if: always()
        run: |
          docker buildx rm "$BUILDER_NAME" || true

  merge-main-images:
    runs-on: ubuntu-latest
    needs: [build-main-image]
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.publish.outputs.image_ref }}
    steps:
      - name: Set repository and image name to lowercase
        run: |
          set -euo pipefail
          image_name="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE_NAME=${REGISTRY}/${image_name}" >> "$GITHUB_ENV"

      - name: Prepare
        run: |
          set -euo pipefail
          ref_tag="${GITHUB_REF_NAME//\//-}"
          ref_tag="$(sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//' <<< "$ref_tag")"
          ref_tag="${ref_tag:-ref}"
          echo "REF_TAG=${ref_tag:0:48}" >> "$GITHUB_ENV"
          echo "TEMP_PREFIX=build-${ref_tag:0:48}-${GITHUB_SHA:0:12}-main" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Create manifest list and push
        id: publish
        run: |
          set -euo pipefail

          sanitize_tag() {
            local tag="$1"
            tag="${tag//\//-}"
            tag="$(sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//' <<< "$tag")"
            tag="${tag:-git-${GITHUB_SHA:0:7}}"
            printf '%s' "${tag:0:128}"
          }

          short_sha="${GITHUB_SHA:0:7}"
          tags=()
          primary_tag=""

          if [[ "$GITHUB_REF_TYPE" == "branch" ]]; then
            branch_tag="$(sanitize_tag "$GITHUB_REF_NAME")"
            tags+=("$branch_tag" "git-${short_sha}")
            primary_tag="$branch_tag"
            if [[ "$GITHUB_REF_NAME" == "main" ]]; then
              tags+=("latest")
            fi
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            ref_tag="$(sanitize_tag "$GITHUB_REF_NAME")"
            version="${GITHUB_REF_NAME#v}"
            tags+=("$ref_tag" "git-${short_sha}")
            primary_tag="$ref_tag"
            if [[ "$version" =~ ^[0-9]+([.][0-9]+){1,2}([-+].*)?$ ]]; then
              version_tag="$(sanitize_tag "$version")"
              major_minor="$(sed -E 's/^([0-9]+)[.]([0-9]+).*/\1.\2/' <<< "$version")"
              tags+=("$version_tag" "$(sanitize_tag "$major_minor")")
              primary_tag="$version_tag"
            fi
          else
            primary_tag="git-${short_sha}"
            tags+=("$primary_tag")
          fi

          declare -A seen=()
          tag_args=()
          echo "Publishing tags:"
          for tag in "${tags[@]}"; do
            if [[ -n "${seen[$tag]:-}" ]]; then
              continue
            fi
            seen[$tag]=1
            echo "  - ${FULL_IMAGE_NAME}:${tag}"
            tag_args+=("-t" "${FULL_IMAGE_NAME}:${tag}")
          done

          docker buildx imagetools create "${tag_args[@]}" \
            "${FULL_IMAGE_NAME}:${TEMP_PREFIX}-linux-amd64" \
            "${FULL_IMAGE_NAME}:${TEMP_PREFIX}-linux-arm64"

          docker buildx imagetools inspect "${FULL_IMAGE_NAME}:${primary_tag}"
          echo "image_ref=${FULL_IMAGE_NAME}:${primary_tag}" >> "$GITHUB_OUTPUT"

  smoke-test-main-image:
    runs-on: ubuntu-latest
    needs: [merge-main-images]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --no-tags --prune --depth=1 origin "$GITHUB_SHA"
          git checkout --force --detach FETCH_HEAD

      - name: Log in to the Container registry
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Run smoke test
        env:
          IMAGE_REF: ${{ needs.merge-main-images.outputs.image_ref }}
          BASE_URL: http://127.0.0.1:18080
        run: |
          bash scripts/ci-smoke-test.sh

  build-slim-image:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Set repository and image name to lowercase
        run: |
          set -euo pipefail
          image_name="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE_NAME=${REGISTRY}/${image_name}" >> "$GITHUB_ENV"

      - name: Prepare
        run: |
          set -euo pipefail
          platform='${{ matrix.platform }}'
          platform_pair="${platform//\//-}"
          ref_tag="${GITHUB_REF_NAME//\//-}"
          ref_tag="$(sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//' <<< "$ref_tag")"
          ref_tag="${ref_tag:-ref}"
          echo "PLATFORM_PAIR=${platform_pair}" >> "$GITHUB_ENV"
          echo "REF_TAG=${ref_tag:0:48}" >> "$GITHUB_ENV"
          echo "TEMP_TAG=build-${ref_tag:0:48}-${GITHUB_SHA:0:12}-slim-${platform_pair}" >> "$GITHUB_ENV"
          echo "BUILDER_NAME=halo-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-slim-${platform_pair}" >> "$GITHUB_ENV"

      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --no-tags --prune --depth=1 origin "$GITHUB_SHA"
          git checkout --force --detach FETCH_HEAD

      - name: Log in to the Container registry
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        run: |
          set -euo pipefail
          docker buildx version
          docker buildx create --name "$BUILDER_NAME" --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build Docker image (slim)
        run: |
          set -euo pipefail
          docker buildx build \
            --platform '${{ matrix.platform }}' \
            --push \
            --provenance=false \
            --cache-from "type=registry,ref=${FULL_IMAGE_NAME}:cache-slim-${PLATFORM_PAIR}" \
            --cache-to "type=registry,ref=${FULL_IMAGE_NAME}:cache-slim-${PLATFORM_PAIR},mode=max" \
            --build-arg "BUILD_HASH=${GITHUB_SHA}" \
            --build-arg "HALO_RUNTIME_PROFILE=slim" \
            -t "${FULL_IMAGE_NAME}:${TEMP_TAG}" \
            .

      - name: Clean up builder
        if: always()
        run: |
          docker buildx rm "$BUILDER_NAME" || true

  merge-slim-images:
    runs-on: ubuntu-latest
    needs: [build-slim-image]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set repository and image name to lowercase
        run: |
          set -euo pipefail
          image_name="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE_NAME=${REGISTRY}/${image_name}" >> "$GITHUB_ENV"

      - name: Prepare
        run: |
          set -euo pipefail
          ref_tag="${GITHUB_REF_NAME//\//-}"
          ref_tag="$(sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//' <<< "$ref_tag")"
          ref_tag="${ref_tag:-ref}"
          echo "REF_TAG=${ref_tag:0:48}" >> "$GITHUB_ENV"
          echo "TEMP_PREFIX=build-${ref_tag:0:48}-${GITHUB_SHA:0:12}-slim" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Create manifest list and push
        run: |
          set -euo pipefail

          sanitize_tag() {
            local tag="$1"
            tag="${tag//\//-}"
            tag="$(sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^-+//; s/-+$//' <<< "$tag")"
            tag="${tag:-git-${GITHUB_SHA:0:7}-slim}"
            printf '%s' "${tag:0:128}"
          }

          short_sha="${GITHUB_SHA:0:7}"
          tags=("git-${short_sha}-slim")
          primary_tag="git-${short_sha}-slim"

          if [[ "$GITHUB_REF_TYPE" == "branch" && "$GITHUB_REF_NAME" == "main" ]]; then
            tags+=("slim")
            primary_tag="slim"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "$version" =~ ^[0-9]+([.][0-9]+){1,2}([-+].*)?$ ]]; then
              version_tag="$(sanitize_tag "${version}-slim")"
              major_minor="$(sed -E 's/^([0-9]+)[.]([0-9]+).*/\1.\2/' <<< "$version")"
              tags+=("$version_tag" "$(sanitize_tag "${major_minor}-slim")")
              primary_tag="$version_tag"
            fi
          fi

          declare -A seen=()
          tag_args=()
          echo "Publishing tags:"
          for tag in "${tags[@]}"; do
            if [[ -n "${seen[$tag]:-}" ]]; then
              continue
            fi
            seen[$tag]=1
            echo "  - ${FULL_IMAGE_NAME}:${tag}"
            tag_args+=("-t" "${FULL_IMAGE_NAME}:${tag}")
          done

          docker buildx imagetools create "${tag_args[@]}" \
            "${FULL_IMAGE_NAME}:${TEMP_PREFIX}-linux-amd64" \
            "${FULL_IMAGE_NAME}:${TEMP_PREFIX}-linux-arm64"

          docker buildx imagetools inspect "${FULL_IMAGE_NAME}:${primary_tag}"
