name: Custom Regression Guard

on:
  push:
    branches:
      - custom
      - future
    paths:
      - 'backend/**'
      - '.github/workflows/custom-regression-guard.yaml'
  pull_request:
    branches:
      - custom
      - future
    paths:
      - 'backend/**'
      - '.github/workflows/custom-regression-guard.yaml'

jobs:
  mcp-core-regression:
    name: MCP Core Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Run MCP core regression tests (warn only)
        run: |
          if ! uv run pytest \
            backend/open_webui/test/unit/test_user_tools_mcp_inherit.py \
            backend/open_webui/test/unit/test_mcp.py; then
            echo "::warning::MCP regression runtime tests failed in GitHub-hosted runner; keep guard non-blocking and rely on local pre-merge verification."
          fi
